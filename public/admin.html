<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaheins CMS — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --pink:#FF4E9B;--pink-dark:#E23E86;--pink-soft:#FFE4F0;--ink:#1E2233;--muted:#7A8194;
    --bg:#F4F5FA;--card:#fff;--line:#EAECF3;--blue:#3B6EF5;--green:#12B76A;--amber:#F79009;
    --red:#F04438;--purple:#7A5AF8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--ink);background:var(--bg)}
  button,input,select,textarea{font-family:inherit}
  button{cursor:pointer}
  .muted{color:var(--muted)}

  /* ---------- LOGIN ---------- */
  .login-screen{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:linear-gradient(135deg,#FFE4F0,#EAF0FF)}
  .login-card{background:#fff;border-radius:20px;box-shadow:0 20px 50px rgba(30,34,51,.12);width:min(400px,100%);padding:34px}
  .login-badge{width:60px;height:60px;background:var(--pink);border-radius:16px;display:grid;place-items:center;
    font-size:1.8rem;margin-bottom:18px;box-shadow:0 8px 20px rgba(255,78,155,.35)}
  .login-card h1{font-size:1.4rem;font-weight:800}
  .login-card p{color:var(--muted);font-size:.9rem;margin:4px 0 22px}
  .login-card label{display:block;font-weight:600;font-size:.82rem;margin:12px 0 6px}
  .login-card input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-size:.95rem}
  .login-card input:focus{outline:none;border-color:var(--pink)}
  .login-card button{width:100%;margin-top:20px;background:var(--pink);color:#fff;border:none;border-radius:11px;
    font-weight:700;font-size:.98rem;padding:13px;transition:background .15s}
  .login-card button:hover{background:var(--pink-dark)} .login-card button:disabled{background:#ccc}
  .login-err{color:var(--red);font-weight:600;font-size:.85rem;margin-top:12px;min-height:1em}

  /* ---------- LAYOUT ---------- */
  #app{display:none}
  .layout{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .sidebar{background:#fff;border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;font-weight:800;font-size:1.05rem}
  .logo .mark{width:38px;height:38px;border-radius:12px;background:var(--pink);display:grid;place-items:center;font-size:1.2rem;
    box-shadow:0 6px 14px rgba(255,78,155,.35)}
  .nav{display:flex;flex-direction:column;gap:3px;flex:1}
  .nav button{display:flex;align-items:center;gap:11px;border:none;background:none;padding:11px 12px;border-radius:11px;
    font-weight:600;font-size:.9rem;color:var(--muted);text-align:left;width:100%}
  .nav button .ic{width:22px;text-align:center;font-size:1.05rem}
  .nav button:hover{background:var(--bg);color:var(--ink)}
  .nav button.active{background:var(--pink-soft);color:var(--pink-dark)}
  .nav .badge{margin-left:auto;background:var(--pink);color:#fff;font-size:.68rem;font-weight:700;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
  .side-logout{border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px;font-weight:600;font-size:.86rem;color:var(--ink);display:flex;gap:9px;align-items:center;justify-content:center}
  .side-logout:hover{border-color:var(--red);color:var(--red)}

  .main{min-width:0}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar .t-title{font-weight:700;font-size:1.02rem}
  .profile{display:flex;align-items:center;gap:11px}
  .profile .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:grid;place-items:center;color:#fff;font-weight:700}
  .profile .who{line-height:1.2} .profile .who b{font-size:.9rem} .profile .who span{font-size:.76rem;color:var(--muted)}
  .page{padding:24px 26px}
  .page-head{margin-bottom:18px}
  .page-head h2{font-size:1.35rem;font-weight:800}
  .crumb{font-size:.82rem;color:var(--muted);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .crumb .hl{color:var(--pink-dark);font-weight:600}

  /* ---------- CARD + TABLE ---------- */
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .panel-head{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .panel-head .h-ttl b{font-size:1.02rem;font-weight:700} .panel-head .h-ttl span{display:block;font-size:.8rem;color:var(--muted)}
  .tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:11px;padding:8px 12px;background:#fff;min-width:210px}
  .search input{border:none;outline:none;font-size:.9rem;width:100%}
  .btn{border:none;border-radius:11px;padding:10px 15px;font-weight:700;font-size:.86rem;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--pink);color:#fff} .btn-primary:hover{background:var(--pink-dark)}
  .btn-soft{background:var(--bg);color:var(--ink);border:1px solid var(--line)} .btn-soft:hover{background:#EAECF3}
  .btn-line{background:#fff;border:1.5px solid var(--line);color:var(--ink)} .btn-line:hover{border-color:var(--pink);color:var(--pink-dark)}
  select.filter{border:1.5px solid var(--line);border-radius:11px;padding:9px 12px;font-size:.86rem;font-weight:600;background:#fff}

  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:640px}
  thead th{text-align:left;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;
    padding:13px 20px;background:#FBFBFD;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:14px 20px;border-bottom:1px solid var(--line);font-size:.9rem;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FCFCFE}
  .cell-strong{font-weight:700}
  .cell-sub{font-size:.78rem;color:var(--muted)}
  .mono{font-variant-numeric:tabular-nums;font-weight:600}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;font-size:.75rem;font-weight:700;border:1.5px solid;white-space:nowrap}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .p-pending{color:var(--amber);border-color:#FEDF89;background:#FFFAEB}
  .p-waiting_confirmation{color:var(--blue);border-color:#B2CCFF;background:#EFF4FF}
  .p-paid{color:var(--green);border-color:#A6F4C5;background:#ECFDF3}
  .p-processing{color:var(--purple);border-color:#D9CFFB;background:#F4F0FF}
  .p-shipped{color:#0BA5EC;border-color:#B9E6FE;background:#F0F9FF}
  .p-done{color:var(--green);border-color:#A6F4C5;background:#ECFDF3}
  .p-cancelled{color:var(--red);border-color:#FECDCA;background:#FEF3F2}
  .p-on{color:var(--green);border-color:#A6F4C5;background:#ECFDF3}
  .p-off{color:var(--muted);border-color:var(--line);background:#F9FAFB}

  .rowacts{display:flex;gap:6px}
  .ico-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:6px 10px;font-size:.8rem;font-weight:600}
  .ico-btn:hover{background:var(--bg)} .ico-btn.danger:hover{border-color:var(--red);color:var(--red)}
  .ico-btn.detail{border-color:#B2CCFF;color:var(--blue)} .ico-btn.detail:hover{background:#EFF4FF}

  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .stat{flex:1;min-width:160px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .stat .lbl{font-size:.76rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:1.5rem;font-weight:800;margin-top:5px}
  .stat .ic{float:right;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:1.1rem}
  .stat.a .ic{background:var(--pink-soft)} .stat.b .ic{background:#EFF4FF} .stat.c .ic{background:#ECFDF3}

  .empty{text-align:center;padding:56px 20px;color:var(--muted)}
  .empty .big{font-size:2.4rem;margin-bottom:8px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:.88rem;z-index:80;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .toast.err{background:var(--red)}

  /* ---------- MODAL ---------- */
  .modal{position:fixed;inset:0;background:rgba(30,34,51,.45);z-index:60;display:none;place-items:center;padding:20px}
  .modal.show{display:grid}
  .modal-card{background:#fff;border-radius:18px;width:min(560px,100%);max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
  .modal-head b{font-size:1.05rem;font-weight:800}
  .modal-head .x{border:none;background:var(--bg);width:34px;height:34px;border-radius:10px;font-size:1rem}
  .modal-body{padding:22px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid .full{grid-column:1/-1}
  .form-grid label{display:block;font-weight:600;font-size:.8rem;margin-bottom:6px}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.9rem}
  .form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus{outline:none;border-color:var(--pink)}
  .form-grid textarea{min-height:70px;resize:vertical}
  .chk{display:flex;align-items:center;gap:9px;padding:9px 0} .chk input{width:auto}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}

  /* order detail */
  .od-row{display:flex;justify-content:space-between;padding:7px 0;font-size:.9rem;border-bottom:1px dashed var(--line)}
  .od-items{margin:12px 0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .od-items .it{display:flex;justify-content:space-between;padding:10px 14px;font-size:.88rem;border-bottom:1px solid var(--line)}
  .od-items .it:last-child{border-bottom:none}
  .od-proof{width:100%;border-radius:12px;border:1px solid var(--line);margin-top:8px;cursor:zoom-in}
  .od-proof-none{padding:20px;text-align:center;color:var(--muted);border:1.5px dashed var(--line);border-radius:12px;margin-top:8px}
  .status-set{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .status-set button{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font-weight:600;font-size:.82rem}
  .status-set button:hover{border-color:var(--pink);color:var(--pink-dark)}
  .mo-list{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:12px}
  .mo-prod{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .mo-prod:last-child{border-bottom:none}
  .mo-pinfo{display:flex;align-items:center;gap:10px;min-width:0}
  .mo-emoji{font-size:1.3rem}
  .mo-qty{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .mo-qty button{width:30px;height:30px;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-size:1.1rem;font-weight:700;line-height:1;cursor:pointer}
  .mo-qty button:hover{border-color:var(--pink);color:var(--pink-dark)}
  .mo-qty span{min-width:22px;text-align:center;font-weight:700}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:90;display:none;place-items:center;padding:24px;cursor:zoom-out}
  .lightbox.show{display:grid} .lightbox img{max-width:100%;max-height:92vh;border-radius:10px}



  .date-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:#FCFCFE}
  .date-lbl{font-weight:700;font-size:.82rem;color:var(--muted)}
  .date-bar input[type=date]{color:var(--ink);cursor:pointer}

  .img-field{display:flex;flex-direction:column;gap:8px}
  .img-prev{width:100%;height:150px;border:1.5px dashed var(--line);border-radius:10px;display:grid;place-items:center;overflow:hidden;background:#FAFBFD;color:var(--muted);font-size:.82rem}
  .img-prev img{width:100%;height:100%;object-fit:cover}
  .img-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--pink);color:#fff;border-radius:10px;padding:10px 14px;font-weight:700;font-size:.85rem;cursor:pointer;width:fit-content}
  .img-btn:hover{background:var(--pink-dark)}
  .img-clear{background:none;border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;width:fit-content}
  .img-clear:hover{border-color:var(--red);color:var(--red)}

  @media(max-width:820px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;overflow-x:auto}
    .nav{flex-direction:row;flex-wrap:wrap} .nav button{width:auto} .side-logout{width:auto}
    .logo{width:100%}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-badge">🍪</div>
      <h1>Kaheins CMS</h1>
      <p>Masuk untuk kelola pesanan, produk & konten toko.</p>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="admin@kaheins.com" />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" />
      <button id="loginBtn">Masuk</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo"><span class="mark">🍪</span> Kaheins CMS</div>
        <nav class="nav" id="nav">
          <button data-v="orders" class="active"><span class="ic">🧾</span> Pesanan <span class="badge" id="navBadge" style="display:none">0</span></button>
          <button data-v="products"><span class="ic">🍪</span> Produk</button>
          <button data-v="categories"><span class="ic">🗂️</span> Kategori</button>
          <button data-v="banners"><span class="ic">🖼️</span> Banner</button>
          <button data-v="promos"><span class="ic">🎁</span> Promo</button>
          <button data-v="vouchers"><span class="ic">🎫</span> Voucher</button>
          <button data-v="testimonials"><span class="ic">⭐</span> Testimoni</button>
        </nav>
        <button class="side-logout" id="logoutBtn">⏻ Keluar</button>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="t-title">Content Management System</div>
          <div class="profile">
            <div class="who" style="text-align:right"><b id="waName">Admin</b><span id="waRole">Administrator</span></div>
            <div class="av" id="waAvatar">A</div>
          </div>
        </div>
        <div class="page" id="page"></div>
      </main>
    </div>
  </div>

  <!-- MODAL + LIGHTBOX -->
  <div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
  <div class="lightbox" id="lightbox"><img id="lightboxImg" alt="bukti" /></div>
  <div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
  const API=(window.BACKEND_URL||""); const TK="kaheins_jwt";
  let token=localStorage.getItem(TK)||""; let me=null;
  let categoriesCache=[]; let activeView="orders";

  const $=(id)=>document.getElementById(id);
  const page=$("page");
  const rupiah=(n)=>"Rp "+Number(n||0).toLocaleString("id-ID");
  const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const fmtDate=(s)=>{ if(!s) return "-"; const d=new Date(s); return d.toLocaleDateString("id-ID",{year:"numeric",month:"2-digit",day:"2-digit"}); };
  const STATUS_LABEL={pending:"Menunggu Pembayaran",waiting_confirmation:"Perlu Dicek",paid:"Lunas",processing:"Diproses",shipped:"Dikirim",done:"Selesai",cancelled:"Dibatalkan"};

  function toast(m,err){ const t=$("toast"); t.textContent=m; t.className="toast show"+(err?" err":""); setTimeout(()=>t.className="toast",2400); }

  async function api(path,opts={}){
    const res=await fetch(API+path,{...opts,headers:{"Content-Type":"application/json",...(opts.headers||{}),...(token?{Authorization:"Bearer "+token}:{})}});
    if(res.status===401){ doLogout(); throw new Error("Sesi habis, login lagi."); }
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||"Terjadi kesalahan.");
    return data;
  }

  // ---------- AUTH ----------
  async function doLogin(){
    const email=$("email").value.trim(),password=$("password").value,errEl=$("loginErr");errEl.textContent="";
    if(!email||!password){errEl.textContent="Isi email & password.";return;}
    const btn=$("loginBtn");btn.disabled=true;btn.textContent="Masuk...";
    try{
      const res=await fetch(API+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(!res.ok){errEl.textContent=data.error||"Login gagal.";return;}
      token=data.token;me=data.user;localStorage.setItem(TK,token);enterApp();
    }catch(e){errEl.textContent="Gagal konek ke server.";}
    finally{btn.disabled=false;btn.textContent="Masuk";}
  }
  function doLogout(){token="";me=null;localStorage.removeItem(TK);$("app").style.display="none";$("loginScreen").style.display="grid";}
  function enterApp(){
    $("loginScreen").style.display="none";$("app").style.display="block";
    if(me){ $("waName").textContent=me.name||"Admin"; $("waRole").textContent=me.email||"Administrator";
      $("waAvatar").textContent=(me.name||me.email||"A").slice(0,1).toUpperCase(); }
    switchView("orders");
  }
  $("loginBtn").addEventListener("click",doLogin);
  $("password").addEventListener("keydown",(e)=>{if(e.key==="Enter")doLogin();});
  $("logoutBtn").addEventListener("click",doLogout);

  // ---------- NAV ----------
  function switchView(v){
    activeView=v;
    document.querySelectorAll("#nav button").forEach((b)=>b.classList.toggle("active",b.dataset.v===v));
    if(v==="orders") viewOrders();
    else if(v==="testimonials") viewTestimonials();
    else viewResource(v);
  }
  document.querySelectorAll("#nav button").forEach((b)=>b.addEventListener("click",()=>switchView(b.dataset.v)));

  function pageHead(title,crumb,section){
    return `<div class="page-head"><h2>${title}</h2>
      <div class="crumb"><span class="hl">🏪 Kaheins Sweetbaked</span> • ${section} • ${crumb}</div></div>`;
  }

  // ================= ORDERS =================
  let allOrders=[]; let orderFilter=""; let orderSearch=""; let orderFrom=""; let orderTo="";
  async function viewOrders(){
    page.innerHTML=pageHead("Data Pesanan","Data Pesanan","Penjualan")+`
      <div class="stats" id="stats"></div>
      <div class="panel">
        <div class="panel-head">
          <div class="h-ttl"><b>Data Pesanan</b><span>Semua daftar pesanan masuk</span></div>
          <div class="tools">
            <div class="search">🔍<input id="ordSearch" placeholder="Cari nama / no pesanan" value="${esc(orderSearch)}"/></div>
            <select class="filter" id="ordFilter">
              ${["","pending","waiting_confirmation","paid","processing","shipped","done","cancelled"].map((s)=>`<option value="${s}" ${s===orderFilter?"selected":""}>${s===""?"Semua Status":STATUS_LABEL[s]}</option>`).join("")}
            </select>
            <button class="btn btn-soft" id="btnExcel">⬇ Excel</button>
            <button class="btn btn-soft" id="btnPdf">⬇ PDF</button>
            <button class="btn btn-primary" id="btnManual">🧾 Order Manual</button>
          </div>
        </div>
        <div class="date-bar">
          <span class="date-lbl">📅 Filter tanggal:</span>
          <input type="date" class="filter" id="ordFrom" value="${orderFrom}" />
          <span class="muted">s/d</span>
          <input type="date" class="filter" id="ordTo" value="${orderTo}" />
          <button class="btn btn-line" id="ordDateClear">Reset</button>
          <span class="muted" id="ordCount" style="margin-left:auto;font-size:.82rem"></span>
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Customer</th><th>Nomor Pesanan</th><th>Total</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr></thead>

  // ambil tanggal lokal (YYYY-MM-DD) dari created_at
  function orderDateKey(o){ const d=new Date(o.created_at); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
  function passDate(o){

  async function loadOrders(){

  window.adminUploadProof=async(id,input)=>{
    const file=input.files&&input.files[0]; if(!file) return;

      const res=await fetch(API+"/api/orders/admin/"+id+"/proof",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.error||"Upload gagal.");

  window.manualQty=(id,delta)=>{

      fields:[{k:"code",label:"Kode",type:"text",required:true},{k:"type",label:"Tipe",type:"select",options:[["percent","Persen (%)"],["fixed","Potongan (Rp)"]]},
        {k:"value",label:"Nilai",type:"number",required:true},{k:"min_order",label:"Min. belanja",type:"number"},
        {k:"max_discount",label:"Maks Potongan (Rp, kosong = tanpa batas)",type:"number",full:true},
        {k:"label",label:"Label",type:"text",full:true},{k:"active",label:"Aktif",type:"checkbox",default:true}]},
  };

  let curItems=[];
  async function viewResource(key){
    const R=RES[key];
    if(key==="products" && !categoriesCache.length){ try{ categoriesCache=(await api("/api/categories/admin")).data||[]; }catch(_){} }
    page.innerHTML=pageHead("Data "+R.title,"Data "+R.title,R.section)+`
      <div class="panel">
        <div class="panel-head">
          <div class="h-ttl"><b>Daftar ${R.title}</b><span>Kelola data ${R.title.toLowerCase()}</span></div>
          <div class="tools">
            <div class="search">🔍<input id="resSearch" placeholder="Cari ${R.title.toLowerCase()}"/></div>
            <button class="btn btn-primary" id="addBtn">+ Tambah ${R.title}</button>
          </div>
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr>${R.cols.map((c)=>`<th>${c[0]}</th>`).join("")}<th>Aksi</th></tr></thead>
          <tbody id="resBody"></tbody>
        </table></div>
      </div>`;
    $("addBtn").addEventListener("click",()=>openResourceForm(key,null));
    $("resSearch").addEventListener("input",(e)=>renderResRows(key,e.target.value));
    try{ curItems=(await api(R.listUrl)).data||[]; renderResRows(key,""); }
    catch(e){ toast(e.message,true); }
  }
  function renderResRows(key,q){
    const R=RES[key]; q=(q||"").trim().toLowerCase();
    const rows=curItems.filter((it)=>!q||JSON.stringify(it).toLowerCase().includes(q));
    const body=$("resBody"); if(!body) return; // guard: view sudah berganti
    if(!rows.length){ body.innerHTML=`<tr><td colspan="${R.cols.length+1}"><div class="empty"><div class="big">📭</div>Belum ada ${R.title.toLowerCase()}.</div></td></tr>`; return; }
    body.innerHTML=rows.map((it)=>{
      const id=it[R.idKey];
      return `<tr>${R.cols.map((c)=>`<td>${c[1](it)}</td>`).join("")}
        <td><div class="rowacts">
          <button class="ico-btn" onclick='openResourceForm(${JSON.stringify(key)},${JSON.stringify(id)})'>Edit</button>
          <button class="ico-btn danger" onclick='delResource(${JSON.stringify(key)},${JSON.stringify(id)})'>Hapus</button>
        </div></td></tr>`;
    }).join("");
  }
  function fieldHtml(f,val){
    const v=val==null?"":val;
    if(f.type==="textarea") return `<textarea id="f_${f.k}">${esc(v)}</textarea>`;
    if(f.type==="checkbox") return `<div class="chk"><input type="checkbox" id="f_${f.k}" ${val?"checked":""}/><span>${f.label}</span></div>`;
    if(f.type==="select") return `<select id="f_${f.k}">${f.options.map(([ov,ol])=>`<option value="${ov}" ${ov===v?"selected":""}>${ol}</option>`).join("")}</select>`;
    if(f.type==="catselect") return `<select id="f_${f.k}"><option value="">— pilih —</option>${categoriesCache.map((c)=>`<option value="${c.id}" ${c.id===v?"selected":""}>${esc(c.name)}</option>`).join("")}</select>`;
    if(f.type==="image") return `
      <div class="img-field">
        <div class="img-prev" id="prev_${f.k}">${v?`<img src="${esc(v)}"/>`:'<span>Belum ada gambar</span>'}</div>
        <label class="img-btn"><span id="upl_${f.k}">📷 Pilih Gambar</span>
          <input type="file" accept="image/*" onchange="uploadImg('${f.k}',this)" hidden/></label>
        ${v?`<button type="button" class="img-clear" onclick="clearImg('${f.k}')">Hapus</button>`:""}
        <input type="hidden" id="f_${f.k}" value="${esc(v)}"/>
      </div>`;
    return `<input type="${f.type==="number"?"number":"text"}" id="f_${f.k}" value="${esc(v)}"/>`;
  }
  window.uploadImg=async(key,input)=>{
    const file=input.files&&input.files[0]; if(!file) return;
    const lbl=$("upl_"+key), prev=$("prev_"+key), hidden=$("f_"+key);
    const old=lbl.textContent; lbl.textContent="Mengunggah...";
    try{
      const fd=new FormData(); fd.append("image",file);
      const res=await fetch(API+"/api/uploads/image",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.error||"Upload gagal.");
      hidden.value=data.url; prev.innerHTML=`<img src="${data.url}"/>`; toast("Gambar terupload");
    }catch(e){ toast(e.message,true); }
    finally{ lbl.textContent=old; input.value=""; }
  };
  window.clearImg=(key)=>{ const h=$("f_"+key),p=$("prev_"+key); if(h)h.value=""; if(p)p.innerHTML='<span>Belum ada gambar</span>'; };
  window.openResourceForm=(key,id)=>{
    const R=RES[key]; const it=id!=null?curItems.find((x)=>String(x[R.idKey])===String(id)):null;
    openModal(`
      <div class="modal-head"><b>${it?"Edit":"Tambah"} ${R.title}</b><button class="x" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><div class="form-grid">
        ${R.fields.map((f)=>`<div class="${f.full||f.type==="textarea"?"full":""}">${f.type==="checkbox"?"":`<label>${f.label}</label>`}${fieldHtml(f,it?it[f.k]:f.default)}</div>`).join("")}
      </div></div>
      <div class="modal-foot"><button class="btn btn-soft" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" onclick='saveResource(${JSON.stringify(key)},${JSON.stringify(id)})'>Simpan</button></div>`);
  };
  window.saveResource=async(key,id)=>{
    const R=RES[key]; const body={};
    for(const f of R.fields){ const el=$("f_"+f.k); if(!el) continue;
      if(f.type==="checkbox") body[f.k]=el.checked;
      else if(f.type==="number") body[f.k]=el.value===""?null:Number(el.value);
      else body[f.k]=el.value===""?(f.k==="category_id"?null:""):el.value; }
    for(const f of R.fields){ if(f.required&&(body[f.k]===""||body[f.k]==null)){ toast(`"${f.label}" wajib diisi`,true); return; } }
    try{
      if(id!=null) await api(R.base+"/"+encodeURIComponent(id),{method:"PATCH",body:JSON.stringify(body)});
      else await api(R.base,{method:"POST",body:JSON.stringify(body)});
      if(key==="categories") categoriesCache=[];
      closeModal(); toast("Tersimpan"); viewResource(key);
    }catch(e){ toast(e.message,true); }
  };
  window.delResource=async(key,id)=>{
    if(!confirm("Hapus data ini?")) return;
    try{ await api(RES[key].base+"/"+encodeURIComponent(id),{method:"DELETE"}); if(key==="categories")categoriesCache=[]; toast("Dihapus"); viewResource(key); }
    catch(e){ toast(e.message,true); }
  };

  // ================= TESTIMONIALS =================
  async function viewTestimonials(){
    page.innerHTML=pageHead("Testimoni","Testimoni","Konten")+`
      <div class="panel"><div class="panel-head"><div class="h-ttl"><b>Daftar Testimoni</b><span>Setujui atau hapus testimoni pelanggan</span></div></div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Nama</th><th>Rating</th><th>Pesan</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr></thead>
          <tbody id="tBody"></tbody></table></div></div>`;
    try{
      const items=(await api("/api/testimonials/admin")).data||[];
      const body=$("tBody"); if(!body) return; // guard: view sudah berganti
      body.innerHTML=items.length?items.map((t)=>`<tr>
        <td class="cell-strong">${esc(t.name)}</td>
        <td>${"★".repeat(t.rating)}<span class="muted">${"★".repeat(5-t.rating)}</span></td>
        <td style="max-width:280px">${esc(t.message||"")}</td>
        <td>${fmtDate(t.created_at)}</td>
        <td><span class="pill ${t.approved?"p-done":"p-pending"}">${t.approved?"Tampil":"Pending"}</span></td>
        <td><div class="rowacts">
          <button class="ico-btn" onclick="approveT('${t.id}',${!t.approved})">${t.approved?"Sembunyikan":"Setujui"}</button>
          <button class="ico-btn danger" onclick="delT('${t.id}')">Hapus</button></div></td></tr>`).join("")
        :`<tr><td colspan="6"><div class="empty"><div class="big">⭐</div>Belum ada testimoni.</div></td></tr>`;
    }catch(e){ toast(e.message,true); }
  }
  window.approveT=async(id,approved)=>{ try{ await api("/api/testimonials/"+id,{method:"PATCH",body:JSON.stringify({approved})}); toast("Diperbarui"); viewTestimonials(); }catch(e){ toast(e.message,true); } };
  window.delT=async(id)=>{ if(!confirm("Hapus testimoni?"))return; try{ await api("/api/testimonials/"+id,{method:"DELETE"}); toast("Dihapus"); viewTestimonials(); }catch(e){ toast(e.message,true); } };

  // ---------- MODAL + LIGHTBOX ----------
  const modal=$("modal");
  function openModal(html){ $("modalCard").innerHTML=html; modal.classList.add("show"); }
  window.closeModal=()=>modal.classList.remove("show");
  modal.addEventListener("click",(e)=>{ if(e.target===modal) closeModal(); });
  const lightbox=$("lightbox");
  window.openLightbox=(u)=>{ $("lightboxImg").src=u; lightbox.classList.add("show"); };
  lightbox.addEventListener("click",()=>{ lightbox.classList.remove("show"); $("lightboxImg").src=""; });
  document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ closeModal(); lightbox.classList.remove("show"); } });

  // ---------- INIT ----------
  (async function init(){
    if(token){ try{ me=(await api("/api/auth/me")).user; enterApp(); return; }catch(_){} }
    doLogout();
  })();
</script>
</body>
